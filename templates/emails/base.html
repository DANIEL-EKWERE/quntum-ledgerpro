<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; padding:0; background:#f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; color:#333; }
  .wrapper { max-width:600px; margin:32px auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.08); }
  .header { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%); padding:36px 40px; text-align:center; }
  .header img { height:44px; margin-bottom:12px; }
  .header h1 { color:#fff; margin:0; font-size:22px; font-weight:700; letter-spacing:.5px; }
  .body { padding:36px 40px; }
  .body h2 { font-size:20px; color:#1a1a2e; margin-top:0; }
  .body p { font-size:15px; line-height:1.7; color:#555; }
  .info-box { background:#f8fafc; border-left:4px solid #0f3460; border-radius:4px; padding:16px 20px; margin:20px 0; }
  .info-box p { margin:4px 0; font-size:14px; color:#444; }
  .info-box strong { color:#1a1a2e; }
  .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600; }
  .badge-pending  { background:#fff3cd; color:#856404; }
  .badge-success  { background:#d1fae5; color:#065f46; }
  .badge-danger   { background:#fee2e2; color:#991b1b; }
  .btn { display:inline-block; margin-top:20px; padding:13px 32px; background:linear-gradient(135deg,#0f3460,#1a6bcc); color:#fff !important; text-decoration:none; border-radius:8px; font-size:15px; font-weight:600; }
  .divider { border:none; border-top:1px solid #eee; margin:28px 0; }
  .footer { background:#f8fafc; padding:24px 40px; text-align:center; font-size:12px; color:#999; }
  .footer a { color:#0f3460; text-decoration:none; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>QuantumLedgerPro</h1>
  </div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    <p>© 2026 QuantumLedgerPro. All rights reserved.</p>
    <p>This is an automated message — please do not reply directly to this email.</p>
    <p><a href="/">Visit our platform</a> &nbsp;|&nbsp; <a href="/accounts/profile/">Manage account</a></p>
  </div>
</div>
</body>
</html>
